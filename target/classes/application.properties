# ==========================================
# FILA HOSPITALAR - Configurações
# ==========================================

# Servidor
server.port=8080

# ==========================================
# Banco de Dados MySQL (Sistema Distribuído)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/fila_hospitalar?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.web=INFO
