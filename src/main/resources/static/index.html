<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FilaFácil</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 1.2rem; font-weight: 600; color: #2563eb; }
  .logo span { color: #1a1a2e; font-weight: 300; }

  .header-right { display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: #64748b; }
  .status-badge { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }

  /* CHAMADA ATUAL */
  .chamada-bar {
    background: #2563eb;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 8px;
  }
  .chamada-item { text-align: center; flex: 1; }
  .chamada-item label {
    display: block;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 4px;
  }
  .chamada-item .valor {
    font-size: 1.8rem;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }
  .sep { width: 1px; height: 40px; background: rgba(255,255,255,0.2); }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
  }
  .stat {
    padding: 14px 12px;
    border-right: 1px solid #e2e8f0;
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-num { font-size: 1.5rem; font-weight: 600; color: #2563eb; line-height: 1; }
  .stat-num.verde { color: #16a34a; }
  .stat-num.cinza { color: #94a3b8; }
  .stat-label { font-size: 0.6rem; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

  /* TABS */
  .tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 500;
    color: #94a3b8;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

  /* CONTENT */
  .content { padding: 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* FILA */
  .fila-lista { display: flex; flex-direction: column; gap: 8px; }
  .fila-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .pos { font-size: 0.72rem; color: #94a3b8; font-weight: 500; text-align: center; }
  .item-nome { font-size: 0.88rem; font-weight: 500; color: #1a1a2e; }
  .item-esp { font-size: 0.7rem; color: #94a3b8; margin-top: 1px; }
  .item-right { text-align: right; }
  .item-senha { font-size: 0.95rem; font-weight: 700; color: #2563eb; }

  .badge {
    display: inline-block;
    font-size: 0.58rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .badge-EMERGENCIA { background: #fee2e2; color: #dc2626; }
  .badge-URGENTE    { background: #fef3c7; color: #d97706; }
  .badge-PRIORITARIO{ background: #ede9fe; color: #7c3aed; }
  .badge-NORMAL     { background: #dbeafe; color: #2563eb; }

  .fila-vazia { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.85rem; }

  /* FORMS */
  .form-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .form-title { font-size: 0.9rem; font-weight: 600; color: #1a1a2e; margin-bottom: 14px; }
  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 0.65rem;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    background: #fff;
    -webkit-appearance: none;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: #2563eb; }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-blue { background: #2563eb; color: #fff; }
  .btn-blue:hover, .btn-blue:active { background: #1d4ed8; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #fff;
    border: 1px solid #e2e8f0;
    border-left: 4px solid #2563eb;
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    z-index: 999;
    animation: toastIn 0.25s ease;
    min-width: 240px;
    text-align: center;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toast-titulo { font-size: 0.7rem; color: #64748b; margin-bottom: 2px; }
  .toast-senha { font-size: 1.8rem; font-weight: 700; color: #2563eb; }
  .toast-nome { font-size: 0.82rem; color: #1a1a2e; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Fila<span>Fácil</span></div>
  <div class="header-right">
    <span id="relogio">--:--</span>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span>Online</span>
    </div>
  </div>
</header>

<div class="chamada-bar">
  <div class="chamada-item">
    <label>Senha</label>
    <div class="valor" id="senhaAtual">—</div>
  </div>
  <div class="sep"></div>
  <div class="chamada-item">
    <label>Guichê</label>
    <div class="valor" id="guicheAtual" style="font-size:1.4rem">—</div>
  </div>
  <div class="sep"></div>
  <div class="chamada-item">
    <label>Aguardando</label>
    <div class="valor" id="totalAguardando">0</div>
  </div>
</div>

<div class="stats-grid">
  <div class="stat">
    <div class="stat-num" id="statAguardando">0</div>
    <div class="stat-label">Espera</div>
  </div>
  <div class="stat">
    <div class="stat-num verde" id="statAtendendo">0</div>
    <div class="stat-label">Atend.</div>
  </div>
  <div class="stat">
    <div class="stat-num cinza" id="statAtendidos">0</div>
    <div class="stat-label">Feitos</div>
  </div>
  <div class="stat">
    <div class="stat-num cinza" id="statTempo">—</div>
    <div class="stat-label">Min.</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('fila')">🏥 Fila</div>
  <div class="tab" onclick="showTab('checkin')">➕ Check-in</div>
  <div class="tab" onclick="showTab('chamar')">📢 Chamar</div>
</div>

<div class="content">
  <!-- FILA -->
  <div class="tab-panel active" id="tab-fila">
    <div class="fila-lista" id="filaLista">
      <div class="fila-vazia">Nenhum paciente aguardando</div>
    </div>
  </div>

  <!-- CHECK-IN -->
  <div class="tab-panel" id="tab-checkin">
    <div class="form-card">
      <div class="form-title">Novo check-in</div>
      <div class="field">
        <label>Nome do paciente</label>
        <input type="text" id="inputNome" placeholder="Nome completo">
      </div>
      <div class="field">
        <label>CPF (opcional)</label>
        <input type="text" id="inputCpf" placeholder="000.000.000-00" inputmode="numeric">
      </div>
      <div class="field">
        <label>Prioridade</label>
        <select id="inputPrioridade">
          <option value="NORMAL">Normal</option>
          <option value="PRIORITARIO">Prioritário (idoso/grávida)</option>
          <option value="URGENTE">Urgente</option>
          <option value="EMERGENCIA">Emergência</option>
        </select>
      </div>
      <div class="field">
        <label>Especialidade</label>
        <select id="inputEspecialidade">
          <option>Clínico Geral</option>
          <option>Ortopedia</option>
          <option>Pediatria</option>
          <option>Cardiologia</option>
          <option>Emergência</option>
        </select>
      </div>
      <button class="btn btn-blue" onclick="realizarCheckin()">Entrar na fila</button>
    </div>
  </div>

  <!-- CHAMAR PRÓXIMO -->
  <div class="tab-panel" id="tab-chamar">
    <div class="form-card">
      <div class="form-title">Chamar próximo</div>
      <div class="field">
        <label>Guichê</label>
        <input type="text" id="inputGuiche" placeholder="Ex: Guichê 01" value="Guichê 01">
      </div>
      <div class="field">
        <label>Especialidade (opcional)</label>
        <select id="inputEspChamar">
          <option value="">Todos</option>
          <option>Clínico Geral</option>
          <option>Ortopedia</option>
          <option>Pediatria</option>
          <option>Cardiologia</option>
          <option>Emergência</option>
        </select>
      </div>
      <button class="btn btn-blue" onclick="chamarProximo()">Chamar próximo</button>
    </div>
  </div>
</div>

<script>
const API = '';

// Tabs
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['fila','checkin','chamar'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// Relógio
setInterval(() => {
  document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}, 1000);

// Polling (atualiza a cada 3s)
async function carregarFila() {
  try {
    const res = await fetch(`${API}/api/fila`);
    renderFila(await res.json());
  } catch { renderFila([]); }
}

async function carregarStats() {
  try {
    const res = await fetch(`${API}/api/fila/estatisticas`);
    const s = await res.json();
    document.getElementById('statAguardando').textContent = s.aguardando ?? 0;
    document.getElementById('statAtendendo').textContent  = s.emAtendimento ?? 0;
    document.getElementById('statAtendidos').textContent  = s.atendidos ?? 0;
    document.getElementById('statTempo').textContent      = s.tempoMedioEsperaMinutos ?? '—';
    document.getElementById('totalAguardando').textContent = s.aguardando ?? 0;
  } catch {}
}

function atualizar() { carregarFila(); carregarStats(); }
setInterval(atualizar, 3000);
atualizar();

async function realizarCheckin() {
  const nome = document.getElementById('inputNome').value.trim();
  if (!nome) { alert('Informe o nome do paciente'); return; }
  const payload = {
    nomePaciente: nome,
    cpf: document.getElementById('inputCpf').value.trim() || null,
    prioridade: document.getElementById('inputPrioridade').value,
    especialidade: document.getElementById('inputEspecialidade').value,
  };
  try {
    const res = await fetch(`${API}/api/fila/checkin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    mostrarToast(nome, data.senha, payload.prioridade);
    document.getElementById('inputNome').value = '';
    document.getElementById('inputCpf').value = '';
    showTab('fila');
    atualizar();
  } catch(e) { alert('Erro ao fazer check-in: ' + e.message); }
}

async function chamarProximo() {
  const guiche = document.getElementById('inputGuiche').value.trim();
  if (!guiche) { alert('Informe o guichê'); return; }
  const payload = { guiche, especialidade: document.getElementById('inputEspChamar').value || null };
  try {
    const res = await fetch(`${API}/api/fila/chamar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.status === 204) { alert('Fila vazia!'); return; }
    const data = await res.json();
    document.getElementById('senhaAtual').textContent = data.senha;
    document.getElementById('guicheAtual').textContent = guiche;
    showTab('fila');
    atualizar();
  } catch(e) { alert('Erro: ' + e.message); }
}

function renderFila(fila) {
  const lista = document.getElementById('filaLista');
  if (!fila.length) {
    lista.innerHTML = '<div class="fila-vazia">Nenhum paciente aguardando</div>';
    return;
  }
  const labels = {EMERGENCIA:'EMERG',URGENTE:'URG',PRIORITARIO:'PRIOR',NORMAL:'NORMAL'};
  lista.innerHTML = fila.map((item, i) => {
    const nome = item.paciente?.nome || '—';
    return `<div class="fila-item">
      <div class="pos">${i+1}</div>
      <div>
        <div class="item-nome">${nome}</div>
        <div class="item-esp">${item.especialidade || 'Clínico Geral'}</div>
      </div>
      <div class="item-right">
        <div class="item-senha">${item.senha}</div>
        <div class="badge badge-${item.prioridade}">${labels[item.prioridade]||item.prioridade}</div>
      </div>
    </div>`;
  }).join('');
}

function mostrarToast(nome, senha, prioridade) {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-titulo">Check-in realizado!</div>
    <div class="toast-senha">${senha}</div>
    <div class="toast-nome">${nome}</div>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}
</script>
</body>
</html>
